<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手机展示</title>
    <link rel="icon" type="image/x-icon" id="favicon">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-r from-blue-100 to-green-100">
    <div class="container mx-auto p-4">
        <div class="mb-8">
            <div class="flex items-center justify-center gap-4">
                <img id="siteLogo" class="h-12 w-auto hidden" alt="网站Logo">
                <h1 class="text-4xl font-extrabold text-center text-gray-800" id="titleClick">
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-green-500 cursor-pointer select-none">二手机展示</span>
                </h1>
            </div>
        </div>

        <p class="text-center text-gray-500 text-sm mb-8">
            最后编辑时间: <span id="lastEditTime"></span>
        </p>

        <div class="flex flex-wrap justify-center mb-6 gap-2">
            <div class="flex items-center bg-white rounded-lg shadow-sm px-3 py-2">
                <span class="text-gray-600 mr-2">排序:</span>
                <div class="flex space-x-1">
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="price" onclick="handleSort('price')">
                        价格
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="name" onclick="handleSort('name')">
                        名称
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="condition" onclick="handleSort('condition')">
                        成色
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="phone-container">
            <!-- 手机卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <!-- 分页控件容器 -->
        <div id="pagination-container" class="mt-8">
            <!-- 分页控件将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 详情模态框 -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <div class="text-center">
                <h2 class="text-2xl font-semibold mb-4" id="modalTitle"></h2>
                <p class="text-lg mb-4" id="modalBasicInfo"></p>
            </div>
            <div class="grid grid-cols-1 gap-4 text-center" id="modalContent">
                <!-- 图片和详情将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </div>

        <!-- Footer -->
    <footer class="bg-gradient-to-r from-blue-100/50 to-green-100/50 backdrop-blur-sm text-center p-4 mt-8 border-t border-gray-200">
        <p class="text-gray-600 text-sm flex items-center justify-center gap-2">
            <span>&copy; mobile-gallery</span>
            <span class="text-gray-300">|</span>
            <a href="https://github.com/li88iioo/mobile-gallery" target="_blank" 
               class="inline-flex items-center text-blue-500 hover:text-blue-700 transition-colors duration-200">
                <svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                </svg>
                GitHub
            </a>
        </p>
    </footer>

    <script src="/js/index.js"></script>
</body>
</html>
