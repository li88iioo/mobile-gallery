<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手机展示</title>
    <link rel="icon" type="image/x-icon" id="favicon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-r from-blue-100 to-green-100">
    <div class="container mx-auto p-4">
        <div class="mb-8">
            <div class="flex items-center justify-center gap-4">
                <img id="siteLogo" class="h-12 w-auto hidden" alt="网站Logo">
                <h1 class="text-4xl font-extrabold text-center text-gray-800" id="titleClick">
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-green-500 cursor-pointer select-none">二手机展示</span>
                </h1>
            </div>
        </div>

        <p class="text-center text-gray-500 text-sm mb-8">
            最后编辑时间: <span id="lastEditTime"></span>
        </p>

        <div class="flex flex-wrap justify-center mb-6 gap-2">
            <div class="flex items-center bg-white rounded-lg shadow-sm px-3 py-2">
                <span class="text-gray-600 mr-2">排序:</span>
                <div class="flex space-x-1">
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="price" onclick="handleSort('price')">
                        价格
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="name" onclick="handleSort('name')">
                        名称
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-md text-sm" data-sort="condition" onclick="handleSort('condition')">
                        成色
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="phone-container">
            <!-- 手机卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <!-- 分页控件容器 -->
        <div id="pagination-container" class="mt-8">
            <!-- 分页控件将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 详情模态框 -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <div class="text-center">
                <h2 class="text-2xl font-semibold mb-4" id="modalTitle"></h2>
                <p class="text-lg mb-4" id="modalBasicInfo"></p>
            </div>
            <div class="grid grid-cols-1 gap-4 text-center" id="modalContent">
                <!-- 图片和详情将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </div>

    <script src="/js/index.js"></script>
</body>
</html>
