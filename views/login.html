<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gradient-to-r from-blue-100 to-green-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold text-center mb-6">管理员登录</h1>
            <form id="loginForm" class="space-y-4" method="POST" action="/api/login">
                <div>
                    <label class="block text-gray-700 mb-2">用户名</label>
                    <input type="text" id="username" class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">密码</label>
                    <input type="password" id="password" class="w-full p-2 border rounded" required>
                </div>
                <div id="errorMessage" class="text-red-500 text-center hidden"></div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    登录
                </button>
                <div class="text-center mt-4">
                    <a href="/" class="text-blue-500 hover:text-blue-700">返回首页</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
